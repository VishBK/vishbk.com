name: Build and Deploy vishbk

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

env:
  IMAGE_NAME: ghcr.io/vishbk/vishbk.com

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          audience: ${{ secrets.TS_AUDIENCE }}
          tags: tag:github

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}   # Synology Tailscale IP
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: 22221
          script: |
            set -e

            DOCKER="/usr/local/bin/docker"
            IMAGE_NAME="${{ env.IMAGE_NAME }}:latest"

            echo "Pulling latest image: $IMAGE_NAME"
            $DOCKER pull $IMAGE_NAME

            echo "Restarting vishbk container..."
            $DOCKER stop vishbk || true
            $DOCKER rm vishbk || true

            $DOCKER run -d \
              --name vishbk \
              -p 8182:8000 \
              -e LASTFM_API_KEY="${{ secrets.LASTFM_API_KEY }}" \
              --restart unless-stopped \
              $IMAGE_NAME

            echo "Pruning old images..."
            $DOCKER image prune -f

            echo "Deployment successful!"
